name: CI - AI Engine
on:
  push:
    branches:
      - "develop"
      - "release/**"
      - "hotfix/**"
      - "feat/**"
      - "bugfix/**"
    paths:
      - "apps/ai-engine/**"
  pull_request:
    branches:
      - "develop"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/_reusable-ci-python-app.yml
    with:
      app_name: "ai-engine"
      working_directory: "apps/ai-engine/capstone/tf-1/ai/engine-skeleton"
