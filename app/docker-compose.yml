version: '3.8'

services:
  platform-service:
    build:
      context: ./platform-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - LOG_LEVEL=INFO
      - ENV_NAME=local
      - AI_ENGINE_URL=http://simulator:8080
      - SLACK_WEBHOOK_URL=http://simulator:8080/services/T00000000/B00000000/XXXXXXXXXXXXXXXXXXXXXXXX
      - JIRA_URL=http://simulator:8080/jira
      - JIRA_USER=mock-user
      - JIRA_TOKEN=mock-token
      - JIRA_PROJECT_KEY=OPS
      - SQS_QUEUE_URL=
    depends_on:
      - simulator

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    ports:
      - "8000:8080"
    environment:
      - PLATFORM_SERVICE_URL=http://platform-service:8080/api/v1/notify
