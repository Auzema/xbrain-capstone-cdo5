apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token-sync
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" 
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: github-token 
    creationPolicy: Owner
  data:
  - secretKey: token
    remoteRef:
      key: /xbrain-cdo5/argocd/github_token
