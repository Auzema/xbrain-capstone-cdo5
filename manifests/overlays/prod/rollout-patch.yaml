apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-engine
spec:
  strategy:
    canary:
      steps:
        - setWeight: 25
        - pause: {duration: 10m}
        - setWeight: 50
        - pause: {duration: 10m}
        - setWeight: 75
        - pause: {duration: 10m}
