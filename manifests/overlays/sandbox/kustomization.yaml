apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true


resources:
- ../../base/ai-engine
- ../../base/platform-service
- ../../base/simulator
- ../../base/correlator-worker

components:
- ../../base/external-secrets

configMapGenerator:
- behavior: merge
  literals:
  - ENV_NAME=sandbox
  - LOG_LEVEL=DEBUG
  - AWS_REGION=us-east-1
  - AI_ENGINE_URL=http://ai-engine:8080
  - CDO_EVIDENCE_ROOT_URI=s3://tf1-triage-hub-sandbox-audit-20260701172515973400000001
  - CDO_EVIDENCE_OUTPUT_PREFIX=s3://tf1-triage-hub-sandbox-audit-20260701172515973400000001/evidence
  - CDO_STATE_URI=s3://tf1-triage-hub-sandbox-audit-20260701172515973400000001/state/open-incidents.json
  - CDO_INCIDENT_OUTPUT_PREFIX=s3://tf1-triage-hub-sandbox-audit-20260701172515973400000001/incident
  - CDO_TRIAGE_REQUEST_OUTPUT_PREFIX=s3://tf1-triage-hub-sandbox-audit-20260701172515973400000001/triage-request
  - NORMALIZED_ALERTS_QUEUE_URL=https://sqs.us-east-1.amazonaws.com/458580846647/tf1-triage-hub-sandbox-incident-queue.fifo
  - AIO_TRIAGE_URL=http://platform-service:8080/api/v1/notify
  name: platform-config

images:
- name: ai-engine
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/tf1-triage-hub-sandbox/ai-engine
  newTag: latest
- name: platform-service
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/tf1-triage-hub-sandbox/platform-service
  newTag: latest
- name: simulator
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/tf1-triage-hub-sandbox/observability-tools
  newTag: latest
- name: correlator-worker
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/tf1-triage-hub-sandbox/correlator-worker
  newTag: latest

patches:
- target:
    kind: ServiceAccount
    name: correlator-worker
  patch: |-
    - op: add
      path: /metadata/annotations
      value:
        eks.amazonaws.com/role-arn: arn:aws:iam::458580846647:role/tf1-triage-hub-sandbox-correlator-worker-irsa
