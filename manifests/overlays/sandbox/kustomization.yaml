apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base/ai-engine
- ../../base/platform-service
- ../../base/simulator

components:
- ../../base/external-secrets

configMapGenerator:
- behavior: merge
  literals:
  - ENV_NAME=sandbox
  - LOG_LEVEL=DEBUG
  - AWS_REGION=us-east-1
  - AI_ENGINE_URL=http://ai-engine:8080
  name: platform-config

images:
# AI Engine: pull từ ECR cross-account của AI team (account 589077667575)
# CDO account (458580846647) đã được cấp quyền pull cross-account
- name: ai-engine
  newName: 589077667575.dkr.ecr.us-east-1.amazonaws.com/tf1-ai-triage-engine
  newTag: git-ac21f60
- name: platform-service
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/xbrain-cdo5-sandbox-tf1-platform-service
  newTag: sandbox-843da53
- name: simulator
  newName: 458580846647.dkr.ecr.us-east-1.amazonaws.com/xbrain-cdo5-sandbox-tf1-simulator
  newTag: sandbox-171a02e

