alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job']
      group_wait: 1s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'platform-service-webhook'
    receivers:
      - name: 'null'
      - name: 'platform-service-webhook'
        webhook_configs:
          - url: "http://simulator.xbrain-cdo5-sandbox.svc.cluster.local/dumbproxy/alertmanager-webhook"
            send_resolved: true
