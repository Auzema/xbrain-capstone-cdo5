alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['job']
      group_wait: 1s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'platform-service-webhook'
    receivers:
      - name: 'null'
      - name: 'platform-service-webhook'
        webhook_configs:
          - url: "https://36f45b74ued4adw2fllrhqopxy0wyoma.lambda-url.us-east-1.on.aws/"
            send_resolved: true
