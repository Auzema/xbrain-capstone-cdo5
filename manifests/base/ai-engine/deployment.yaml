apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: ai-engine
  labels:
    app.kubernetes.io/name: ai-engine
    app.kubernetes.io/component: ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-engine
  strategy:
    canary:
      steps:
        - setWeight: 100
  template:
    metadata:
      labels:
        app: ai-engine
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ai-engine
          image: ai-engine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
