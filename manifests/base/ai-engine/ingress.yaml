apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-engine-ingress
  labels:
    app.kubernetes.io/name: ai-engine
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: api.cdo5.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-engine
            port:
              number: 8080
