apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-service
  namespace: aiops
  labels:
    app: platform-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-service
  template:
    metadata:
      labels:
        app: platform-service
    spec:
      serviceAccountName: correlator-worker
      containers:
        - name: platform-service
          image: platform-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Non-sensitive configuration from ConfigMap
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: LOG_LEVEL
            - name: ENV_NAME
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: ENV_NAME
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: AWS_REGION
            - name: JIRA_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: JIRA_URL
            - name: JIRA_USER
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: JIRA_USER
            - name: JIRA_PROJECT_KEY
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: JIRA_PROJECT_KEY
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: SQS_QUEUE_URL
            - name: AI_ENGINE_URL
              valueFrom:
                configMapKeyRef:
                  name: platform-service-config
                  key: AI_ENGINE_URL
            # Sensitive configuration from Kubernetes Secret (synced from Secrets Manager via ESO)
            - name: JIRA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-service-k8s-secret
                  key: JIRA_API_TOKEN
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: platform-service-k8s-secret
                  key: SLACK_WEBHOOK_URL
            - name: AI_ENGINE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: platform-service-k8s-secret
                  key: SERVICE_AUTH_TOKEN
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
