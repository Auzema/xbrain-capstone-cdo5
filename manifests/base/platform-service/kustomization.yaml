apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - service-canary.yaml
  - ingress.yaml
  - analysis-template.yaml

configMapGenerator:
  - name: platform-config
    literals:
      - ENV_NAME=base
      - LOG_LEVEL=INFO
